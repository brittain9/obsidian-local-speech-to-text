name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Open Obsidian
        2. Enable Local STT plugin
        3. ...
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g., macOS 15.3, Fedora 43, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: "e.g., 1.8.0"
    validations:
      required: true

  - type: dropdown
    id: sidecar-build
    attributes:
      label: Sidecar build type
      options:
        - CPU
        - CUDA
        - Metal
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error messages
      description: Paste any relevant console output. Enable Developer Mode in plugin settings for verbose logging.
      render: shell
    validations:
      required: false
