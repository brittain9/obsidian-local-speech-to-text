name: Architecture / Design Discussion
description: Discuss a design decision, architectural change, or technical direction
labels: [design]
body:
  - type: input
    id: topic
    attributes:
      label: Topic
      placeholder: "e.g., Transcript post-processing pipeline"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What prompted this discussion? What's the current state?
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: Options considered
      description: What approaches are on the table? Include trade-offs if known.
    validations:
      required: false

  - type: textarea
    id: related
    attributes:
      label: Related decisions
      description: Reference any existing entries in `tasks/decisions.md` (e.g., D-017).
    validations:
      required: false
