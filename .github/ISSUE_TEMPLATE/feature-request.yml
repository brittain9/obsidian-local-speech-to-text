name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: what-and-why
    attributes:
      label: What and why?
      description: Describe the feature and why it would be useful.
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
      description: How do you handle this today, if at all?
    validations:
      required: false

  - type: textarea
    id: design
    attributes:
      label: Design considerations
      description: Any thoughts on how this should work, constraints, or trade-offs?
    validations:
      required: false
