name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# PR push storms shouldn't fan out N parallel quality jobs against stale code.
# Cancel any in-flight run for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.14.1
  RUST_TOOLCHAIN: 1.94.1

jobs:
  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js + npm
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'true'
          upgrade-npm: 'true'

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run frontend quality gates
        run: npm run check:frontend

  sidecar-quality:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_cache_key: engine-cohere-transcribe
          - os: windows-latest
            rust_cache_key: engine-cohere-transcribe-windows
          - os: macos-15
            rust_cache_key: engine-cohere-transcribe-gpu-metal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js + npm
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'true'
          upgrade-npm: 'true'

      - name: Setup Rust
        uses: ./.github/actions/setup-sidecar-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
          cache-workspaces: native -> target
          cache-shared-key: ${{ matrix.rust_cache_key }}

      - name: Install JavaScript dependencies
        run: npm ci

      # build:sidecar selects gpu-metal on darwin automatically, so this single
      # step covers the macOS Metal build exactly once across the matrix.
      - name: Build sidecar
        run: npm run build:sidecar

      - name: Run Rust quality gates
        run: npm run check:rust
