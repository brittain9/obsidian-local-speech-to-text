name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_metal: false
            rust_cache_key: engine-cohere-transcribe
          - os: windows-latest
            build_metal: false
            rust_cache_key: engine-cohere-transcribe-windows
          - os: macos-15
            build_metal: true
            rust_cache_key: engine-cohere-transcribe-gpu-metal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm

      - name: Upgrade npm
        run: npm install --global npm@11.12.1

      - name: Install native build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Expose libclang (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target
          shared-key: ${{ matrix.rust_cache_key }}
          cache-on-failure: true

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build macOS Metal sidecar
        if: matrix.build_metal
        run: npm run build:sidecar

      - name: Run quality gates
        run: npm run check

  build-release-linux:
    if: github.event_name == 'workflow_dispatch'
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target
          shared-key: release-linux-cpu

      - name: Build Linux CPU sidecar
        run: npm run build:sidecar:release

      - id: arch
        name: Detect architecture
        run: echo "value=$(uname -m)" >> "$GITHUB_OUTPUT"

      - name: Prepare release artifact
        run: |
          mkdir -p dist
          cp native/target/release/obsidian-local-stt-sidecar \
            dist/sidecar-linux-${{ steps.arch.outputs.value }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-linux-${{ steps.arch.outputs.value }}
          path: dist/sidecar-linux-${{ steps.arch.outputs.value }}

  build-release-windows:
    if: github.event_name == 'workflow_dispatch'
    needs: quality
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: Expose libclang
        shell: pwsh
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target
          shared-key: release-windows-cpu

      - name: Build Windows CPU sidecar
        run: npm run build:sidecar:release

      - name: Prepare release artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item native/target/release/obsidian-local-stt-sidecar.exe `
            dist/sidecar-windows-x86_64.exe

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-windows-x86_64
          path: dist/sidecar-windows-x86_64.exe

  build-release-windows-cuda:
    if: github.event_name == 'workflow_dispatch'
    needs: quality
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: Expose libclang
        shell: pwsh
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target-cuda
          shared-key: release-windows-cuda

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.0'
          method: network

      - name: Build Windows CUDA sidecar
        run: npm run build:sidecar:cuda:windows:release

      - name: Prepare release artifact
        shell: pwsh
        run: |
          $artifactDir = 'dist/sidecar-windows-x86_64-cuda'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Copy-Item native/target-cuda/release/obsidian-local-stt-sidecar.exe $artifactDir
          Copy-Item native/target-cuda/release/onnxruntime_providers_shared.dll $artifactDir
          Copy-Item native/target-cuda/release/onnxruntime_providers_cuda.dll $artifactDir

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-windows-x86_64-cuda
          path: dist/sidecar-windows-x86_64-cuda

  build-release-macos:
    if: github.event_name == 'workflow_dispatch'
    needs: quality
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target
          shared-key: release-macos-gpu-metal

      - name: Build macOS Metal sidecar
        run: npm run build:sidecar:release

      - id: arch
        name: Detect architecture
        run: echo "value=$(uname -m)" >> "$GITHUB_OUTPUT"

      - name: Prepare release artifact
        run: |
          mkdir -p dist
          cp native/target/release/obsidian-local-stt-sidecar \
            dist/sidecar-macos-${{ steps.arch.outputs.value }}

      - name: Ad-hoc sign macOS binary
        run: codesign --force --sign - dist/sidecar-macos-${{ steps.arch.outputs.value }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-macos-${{ steps.arch.outputs.value }}
          path: dist/sidecar-macos-${{ steps.arch.outputs.value }}
