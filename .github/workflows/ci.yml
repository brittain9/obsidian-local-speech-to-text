name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_metal: false
            rust_cache_key: engine-cohere-transcribe
          - os: windows-latest
            build_metal: false
            rust_cache_key: engine-cohere-transcribe-windows
          - os: macos-15
            build_metal: true
            rust_cache_key: engine-cohere-transcribe-gpu-metal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm

      - name: Upgrade npm
        run: npm install --global npm@11.12.1

      - name: Install native build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Expose libclang (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "LIBCLANG_PATH=$((Get-Command clang).Source | Split-Path -Parent)" >> $env:GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target
          shared-key: ${{ matrix.rust_cache_key }}
          cache-on-failure: true

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build macOS Metal sidecar
        if: matrix.build_metal
        run: npm run build:sidecar

      - name: Run quality gates
        run: npm run check
