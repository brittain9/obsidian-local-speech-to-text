name: release

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].*.*'

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - id: version
        name: Resolve release version
        run: echo "value=$(node scripts/read-release-version.mjs)" >> "$GITHUB_OUTPUT"

      - name: Validate pushed tag
        if: github.event_name == 'push'
        run: node scripts/read-release-version.mjs --tag "${GITHUB_REF_NAME}"

  plugin-bundle:
    needs: metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm

      - name: Upgrade npm
        run: npm install --global npm@11.12.1

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build plugin bundle
        run: npm run build:frontend

      - name: Upload plugin bundle
        uses: actions/upload-artifact@v7
        with:
          name: plugin-bundle
          path: |
            main.js
            manifest.json
            styles.css

  build-sidecar-posix:
    needs: metadata
    # GGML_NATIVE=OFF forces a portable CPU feature baseline (falls back to
    # GGML_AVX2). Without this, ggml's cmake probes the runner's CPU and bakes
    # in whatever SIMD it supports (AVX-512 on current Azure ubuntu-latest /
    # windows-latest runners), which crashes with STATUS_ILLEGAL_INSTRUCTION
    # on consumer CPUs that don't execute AVX-512 (e.g. Alder Lake / Raptor
    # Lake). Set at job scope so Swatinem/rust-cache — which runs before the
    # Build sidecar step — sees it when computing its key, otherwise stale
    # AVX-512-compiled artifacts get restored and silently re-shipped.
    env:
      GGML_NATIVE: 'OFF'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            asset_name: sidecar-macos-arm64
            archive_name: sidecar-macos-arm64.tar.gz
            binary_path: native/target/release/obsidian-local-stt-sidecar
            build_command: npm run build:sidecar:release
            cache_workspaces: native -> target
            cuda: false
          - runner: ubuntu-latest
            asset_name: sidecar-linux-x86_64-cpu
            archive_name: sidecar-linux-x86_64-cpu.tar.gz
            binary_path: native/target/release/obsidian-local-stt-sidecar
            build_command: npm run build:sidecar:release
            cache_workspaces: native -> target
            cuda: false
          - runner: ubuntu-latest
            asset_name: sidecar-linux-x86_64-cuda
            archive_name: sidecar-linux-x86_64-cuda.tar.gz
            binary_path: native/target-cuda/release/obsidian-local-stt-sidecar
            build_command: npm run build:sidecar:cuda:release
            cache_workspaces: native -> target-cuda
            cuda: true

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: Install native build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.cache_workspaces }}
          shared-key: ${{ matrix.asset_name }}
          # Extend the default prefix list (CARGO CC CFLAGS CXX CMAKE RUST)
          # with GGML and WHISPER so any future toggle of a GGML_* / WHISPER_*
          # env (e.g. GGML_NATIVE) bumps the cache key and invalidates stale
          # artifacts automatically.
          env-vars: CARGO CC CFLAGS CXX CMAKE RUST GGML WHISPER
          cache-on-failure: true

      - name: Install CUDA toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.0'
          method: network

      - name: Build sidecar
        run: ${{ matrix.build_command }}

      - name: Ad-hoc sign macOS binary
        if: runner.os == 'macOS'
        run: codesign --force --sign - ${{ matrix.binary_path }}

      - name: Package release archive
        shell: bash
        env:
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          ASSET_NAME: ${{ matrix.asset_name }}
          BINARY_PATH: ${{ matrix.binary_path }}
          CUDA: ${{ matrix.cuda }}
        run: |
          artifact_dir="dist/${ASSET_NAME}"
          mkdir -p "$artifact_dir"
          cp "$BINARY_PATH" "$artifact_dir/obsidian-local-stt-sidecar"
          if [[ "$CUDA" == "true" ]]; then
            extra_files=$(node -e 'const d=require("./native/cuda-artifacts.json"); console.log(d.providers.linux.join(" "))')
            for extra_file in $extra_files; do
              cp "$(dirname "$BINARY_PATH")/$extra_file" "$artifact_dir/$extra_file"
            done
            # CUDA runtime libs aren't provided by the user's system in a
            # version-compatible form (cudart is major-versioned and not
            # forward-compatible), so ship them next to the binary. cp -L
            # dereferences the symlinks into real files. Derive the lib
            # directory the same way scripts/build-cuda.sh does so there's
            # one source of truth.
            cuda_lib="$(dirname "$(dirname "$(which nvcc)")")/targets/$(uname -m)-linux/lib"
            runtime_files=$(node -e 'const d=require("./native/cuda-artifacts.json"); console.log(d.runtime.linux.join(" "))')
            for runtime_file in $runtime_files; do
              cp -L "$cuda_lib/$runtime_file" "$artifact_dir/$runtime_file"
            done
          fi
          tar -czf "dist/${ARCHIVE_NAME}" -C "$artifact_dir" .

      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ matrix.archive_name }}

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.archive_name }}

  build-sidecar-windows:
    needs: metadata
    # See build-sidecar-posix for rationale. Must be at job scope so
    # Swatinem/rust-cache's key-computation sees it.
    env:
      GGML_NATIVE: 'OFF'
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: sidecar-windows-x86_64-cpu
            archive_name: sidecar-windows-x86_64-cpu.zip
            binary_path: native/target/release/obsidian-local-stt-sidecar.exe
            build_command: npm run build:sidecar:release
            cache_workspaces: native -> target
            cuda: false
          - asset_name: sidecar-windows-x86_64-cuda
            archive_name: sidecar-windows-x86_64-cuda.zip
            binary_path: native/target-cuda/release/obsidian-local-stt-sidecar.exe
            build_command: npm run build:sidecar:cuda:windows:release
            cache_workspaces: native -> target-cuda
            cuda: true

    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: Expose libclang
        shell: pwsh
        run: echo "LIBCLANG_PATH=$((Get-Command clang).Source | Split-Path -Parent)" >> $env:GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.cache_workspaces }}
          shared-key: ${{ matrix.asset_name }}
          env-vars: CARGO CC CFLAGS CXX CMAKE RUST GGML WHISPER
          cache-on-failure: true

      - name: Install CUDA toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.0'
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "cufft", "visual_studio_integration"]'

      - name: Build sidecar
        shell: pwsh
        run: ${{ matrix.build_command }}

      - name: Package release archive
        shell: pwsh
        env:
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          ASSET_NAME: ${{ matrix.asset_name }}
          BINARY_PATH: ${{ matrix.binary_path }}
          CUDA: ${{ matrix.cuda }}
        run: |
          $artifactDir = "dist/$env:ASSET_NAME"
          $binaryDir = Split-Path $env:BINARY_PATH -Parent
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Copy-Item $env:BINARY_PATH "$artifactDir/obsidian-local-stt-sidecar.exe"
          if ($env:CUDA -eq 'true') {
            # Copy only the ORT provider DLLs we actually register (not a
            # blanket *.dll glob, which scoops up unused providers like
            # DirectML and TensorRT that ort's copy-dylibs drops alongside).
            $providerJson = node -e "const d=require('./native/cuda-artifacts.json'); console.log(d.providers.win32.join(' '))"
            foreach ($providerFile in $providerJson.Trim().Split(' ')) {
              Copy-Item (Join-Path $binaryDir $providerFile) (Join-Path $artifactDir $providerFile)
            }
            # Ship the CUDA runtime DLLs we directly import. Windows DLL search
            # order checks the exe's own directory first, so this bundled copy
            # wins over any mismatched system-installed CUDA the user may have.
            $runtimeJson = node -e "const d=require('./native/cuda-artifacts.json'); console.log(d.runtime.win32.join(' '))"
            foreach ($runtimeFile in $runtimeJson.Trim().Split(' ')) {
              $source = Join-Path $env:CUDA_PATH "bin/$runtimeFile"
              Copy-Item $source (Join-Path $artifactDir $runtimeFile)
            }
          }
          Compress-Archive -Path "$artifactDir/*" -DestinationPath "dist/$env:ARCHIVE_NAME" -Force

      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ matrix.archive_name }}

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.archive_name }}

  publish:
    needs:
      - metadata
      - plugin-bundle
      - build-sidecar-posix
      - build-sidecar-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download plugin bundle
        uses: actions/download-artifact@v5
        with:
          name: plugin-bundle
          path: dist/plugin-bundle

      - name: Download sidecar archives
        uses: actions/download-artifact@v5
        with:
          pattern: sidecar-*
          path: dist/release
          merge-multiple: true

      - name: Assemble release files
        run: |
          mkdir -p dist/release
          cp dist/plugin-bundle/main.js dist/release/main.js
          cp dist/plugin-bundle/manifest.json dist/release/manifest.json
          cp dist/plugin-bundle/styles.css dist/release/styles.css
          (cd dist/release && find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -printf '%P\n' \
            | sort \
            | xargs sha256sum > checksums.txt)
          test -f dist/release/main.js
          test -f dist/release/manifest.json
          test -f dist/release/styles.css
          test -s dist/release/checksums.txt

      - name: Upload dry-run bundle
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.metadata.outputs.version }}
          path: dist/release/*

      - name: Create draft release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          name: ${{ needs.metadata.outputs.version }}
          tag_name: ${{ needs.metadata.outputs.version }}
          draft: true

      - name: Publish release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.metadata.outputs.version }}
        run: gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"
