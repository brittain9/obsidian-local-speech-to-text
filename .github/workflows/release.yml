name: release

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9]+.[0-9]+'

# Read-only at the top level. Each job opts in to the writes it needs.
permissions:
  contents: read

# Serialize releases for the same ref so a tag re-push or a dry-run racing a
# tag push can't interleave artifact uploads. cancel-in-progress is false —
# half-finished publishes are worse than queueing.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # GGML_NATIVE=OFF forces a portable CPU feature baseline (falls back to
  # GGML_AVX2). Without this, ggml's cmake probes the runner's CPU and bakes
  # in whatever SIMD it supports (AVX-512 on current Azure ubuntu-latest /
  # windows-latest runners), which crashes with STATUS_ILLEGAL_INSTRUCTION on
  # consumer CPUs that don't execute AVX-512 (e.g. Alder Lake / Raptor Lake).
  # Inherited by every job env so Swatinem/rust-cache (which runs before the
  # Build sidecar step) sees it when computing its key, otherwise stale
  # AVX-512-compiled artifacts get restored and silently re-shipped.
  GGML_NATIVE: 'OFF'
  NODE_VERSION: 24.14.1
  RUST_TOOLCHAIN: 1.94.1

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js + npm
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - id: version
        name: Resolve release version
        run: echo "value=$(node scripts/read-release-version.mjs)" >> "$GITHUB_OUTPUT"

      - name: Validate pushed tag
        if: github.event_name == 'push'
        run: node scripts/read-release-version.mjs --tag "${GITHUB_REF_NAME}"

  plugin-bundle:
    needs: metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js + npm
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'true'
          upgrade-npm: 'true'

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run frontend quality gates
        run: npm run check:frontend

      - name: Upload plugin bundle
        uses: actions/upload-artifact@v7
        with:
          name: plugin-bundle
          path: |
            main.js
            manifest.json
            styles.css

  native-quality:
    needs: metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js + npm
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'true'
          upgrade-npm: 'true'

      - name: Setup Rust
        uses: ./.github/actions/setup-sidecar-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
          cache-workspaces: native -> target
          cache-shared-key: native-quality

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build sidecar
        run: npm run build:sidecar

      - name: Run Rust quality gates
        run: npm run check:rust

  build-sidecar-posix:
    needs:
      - metadata
      - native-quality
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      # ggml's CUDA 12.9 default builds PTX/SASS for nine architecture variants,
      # which dominates release CUDA jobs (especially on Windows). Ship one
      # forward-compatible Turing PTX target instead. That requires a Turing-or-
      # newer NVIDIA GPU for CUDA acceleration; older GPUs use the CPU sidecar.
      CMAKE_CUDA_ARCHITECTURES: ${{ matrix.cuda_architectures }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            asset_name: sidecar-macos-arm64
            archive_name: sidecar-macos-arm64.tar.gz
            binary_path: native/target/release/local-transcript-sidecar
            build_command: npm run build:sidecar:release
            cache_workspaces: native -> target
            cuda: false
            cuda_architectures: ''
          - runner: ubuntu-latest
            asset_name: sidecar-linux-x86_64-cpu
            archive_name: sidecar-linux-x86_64-cpu.tar.gz
            binary_path: native/target/release/local-transcript-sidecar
            build_command: npm run build:sidecar:release
            cache_workspaces: native -> target
            cuda: false
            cuda_architectures: ''
          - runner: ubuntu-latest
            asset_name: sidecar-linux-x86_64-cuda
            archive_name: sidecar-linux-x86_64-cuda.tar.gz
            binary_path: native/target-cuda/release/local-transcript-sidecar
            build_command: npm run build:sidecar:cuda:release
            cache_workspaces: native -> target-cuda
            cuda: true
            cuda_architectures: '75-virtual'

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js + npm
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: ./.github/actions/setup-sidecar-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-workspaces: ${{ matrix.cache_workspaces }}
          cache-shared-key: ${{ matrix.asset_name }}

      - name: Install CUDA toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.0'
          method: network

      - name: Build sidecar
        env:
          CARGO_TIMINGS: '1'
          CMAKE_CUDA_FLAGS: '-t0'
        run: ${{ matrix.build_command }}

      - name: Upload cargo timings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: timings-${{ matrix.asset_name }}
          path: native/target*/cargo-timings/*.html
          if-no-files-found: ignore

      - name: Ad-hoc sign macOS binary
        if: runner.os == 'macOS'
        run: codesign --force --sign - ${{ matrix.binary_path }}

      - name: Package release archive
        env:
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          ASSET_NAME: ${{ matrix.asset_name }}
          BINARY_PATH: ${{ matrix.binary_path }}
          CUDA: ${{ matrix.cuda }}
        run: node scripts/package-sidecar-archive.mjs

      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ matrix.archive_name }}

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.archive_name }}

  build-sidecar-windows:
    needs:
      - metadata
      - native-quality
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      CMAKE_CUDA_ARCHITECTURES: ${{ matrix.cuda_architectures }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: sidecar-windows-x86_64-cpu
            archive_name: sidecar-windows-x86_64-cpu.zip
            binary_path: native/target/release/local-transcript-sidecar.exe
            build_command: npm run build:sidecar:release
            cache_workspaces: native -> target
            cuda: false
            cuda_architectures: ''
          - asset_name: sidecar-windows-x86_64-cuda
            archive_name: sidecar-windows-x86_64-cuda.zip
            binary_path: native/target-cuda/release/local-transcript-sidecar.exe
            build_command: npm run build:sidecar:cuda:windows:release
            cache_workspaces: native -> target-cuda
            cuda: true
            cuda_architectures: '75-virtual'

    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js + npm
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: ./.github/actions/setup-sidecar-rust
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-workspaces: ${{ matrix.cache_workspaces }}
          cache-shared-key: ${{ matrix.asset_name }}

      - name: Install CUDA toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.0'
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "cufft", "visual_studio_integration"]'

      - name: Build sidecar
        shell: pwsh
        env:
          CARGO_TIMINGS: '1'
          CMAKE_CUDA_FLAGS: '-t0'
        run: ${{ matrix.build_command }}

      - name: Upload cargo timings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: timings-${{ matrix.asset_name }}
          path: native/target*/cargo-timings/*.html
          if-no-files-found: ignore

      - name: Package release archive
        env:
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          ASSET_NAME: ${{ matrix.asset_name }}
          BINARY_PATH: ${{ matrix.binary_path }}
          CUDA: ${{ matrix.cuda }}
        run: node scripts/package-sidecar-archive.mjs

      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ matrix.archive_name }}

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.archive_name }}

  publish:
    needs:
      - metadata
      - plugin-bundle
      - build-sidecar-posix
      - build-sidecar-windows
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js + npm
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download plugin bundle
        uses: actions/download-artifact@v5
        with:
          name: plugin-bundle
          path: dist/plugin-bundle

      - name: Download sidecar archives
        uses: actions/download-artifact@v5
        with:
          pattern: sidecar-*
          path: dist/release
          merge-multiple: true

      - name: Assemble release files
        run: node scripts/assemble-release-files.mjs

      - name: Upload dry-run bundle
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.metadata.outputs.version }}
          path: dist/release/*

      - name: Create draft release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          name: ${{ needs.metadata.outputs.version }}
          tag_name: ${{ needs.metadata.outputs.version }}
          draft: true

      - name: Publish release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.metadata.outputs.version }}
        run: gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"
